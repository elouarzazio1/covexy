<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
    width: 300px;
  }

  .container {
    width: 300px;
    background: rgba(15, 15, 16, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.35s ease, transform 0.35s ease;
    -webkit-app-region: drag;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
  }

  .inner {
    padding: 13px 15px 11px;
  }

  /* ── Top row ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .category-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .category-badge.email    { background: rgba(0,122,255,0.22);   color: #5ac8fa; }
  .category-badge.task     { background: rgba(48,209,88,0.18);   color: #30d158; }
  .category-badge.research { background: rgba(255,159,10,0.22);  color: #ff9f0a; }
  .category-badge.idea     { background: rgba(191,90,242,0.22);  color: #bf5af2; }
  .category-badge.focus    { background: rgba(255,214,10,0.18);  color: #ffd60a; }
  .category-badge.alert    { background: rgba(255,69,58,0.22);   color: #ff453a; }
  .category-badge.writing  { background: rgba(90,200,250,0.18);  color: #5ac8fa; }

  .wordmark {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.22);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Message ─── */
  .message {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.92);
    line-height: 1.42;
    margin-bottom: 11px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Bottom row ─── */
  .actions {
    display: flex;
    align-items: center;
    gap: 6px;
    -webkit-app-region: no-drag;
  }

  .feedback-btn {
    padding: 4px 9px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 7px;
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.5);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
  }
  .feedback-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }
  .feedback-btn:active { transform: scale(0.96); }

  .open-chat-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: #E35335;
    font-size: 11px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    padding: 4px 0;
    transition: opacity 0.12s;
    white-space: nowrap;
  }
  .open-chat-btn:hover  { opacity: 0.75; }
  .open-chat-btn:active { opacity: 0.5; }

  /* ── Progress bar ─── */
  .progress-wrap {
    height: 2px;
    background: rgba(255, 255, 255, 0.05);
  }

  .progress-fill {
    height: 2px;
    width: 100%;
    background: rgba(227, 83, 53, 0.6);
  }
</style>
</head>
<body>
<div class="container">
  <div class="inner">
    <div class="header">
      <span class="category-badge focus" id="badge">FOCUS</span>
      <span class="wordmark">Covexy</span>
    </div>
    <div class="message" id="message"></div>
    <div class="actions">
      <button class="feedback-btn" onclick="sendFeedback('thumbs-up')">👍 Helpful</button>
      <button class="feedback-btn" onclick="sendFeedback('thumbs-down')">👎 Not useful</button>
      <button class="open-chat-btn"  onclick="openChat()">Open chat →</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress-bar"></div>
  </div>
</div>
<script src="overlay.js"></script>
</body>
</html>
